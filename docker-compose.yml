version: '3.9'

# ─────────────────────────────────────────────────────────────────────────────
# Enterprise Workforce HRIS — Docker Compose
#
# Services:
#   db    — MySQL 8.0 with custom charset and InnoDB config
#   api   — Django / Gunicorn application server
#   nginx — Nginx reverse proxy (static files + SSL termination)
#
# Usage:
#   docker compose up --build          # First run
#   docker compose up -d               # Background
#   docker compose exec api python manage.py migrate
#   docker compose exec api python manage.py seed_data
#   docker compose exec api pytest tests/ -v
#   docker compose down -v             # Destroy containers + volumes
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── MySQL ──────────────────────────────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: hris_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: employee_management_db
      MYSQL_USER: hris_user
      MYSQL_PASSWORD: hris_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/custom.cnf:ro
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "hris_user", "-phris_password"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s

  # ── Django API ─────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hris_api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_HOST: localhost #db          # Override .env DB_HOST to use Docker service name
      DB_PORT: 3306
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
      - ./logs:/app/logs
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "
        echo 'Waiting for MySQL...' &&
        python manage.py migrate --noinput &&
        python manage.py collectstatic --noinput &&
        gunicorn config.wsgi:application
          --bind 0.0.0.0:8000
          --workers 3
          --timeout 120
          --access-logfile -
          --error-logfile -
      "

  # ── Nginx ──────────────────────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: hris_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - static_volume:/app/staticfiles:ro
      - media_volume:/app/media:ro
    depends_on:
      - api

volumes:
  mysql_data:
  static_volume:
  media_volume:
