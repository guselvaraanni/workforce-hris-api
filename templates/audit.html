<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audit Logs - Enterprise HRIS</title>
    <link rel="stylesheet" href="/static/css/styles.css">
    <style>
        .theme-toggle { position: fixed; top: 20px; right: 100px; z-index: 500; background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: var(--spacing-sm) var(--spacing-md); cursor: pointer; }
        .filter-bar { display: flex; gap: var(--spacing-md); margin-bottom: var(--spacing-xl); flex-wrap: wrap; }
        .filter-bar input { flex: 1; min-width: 200px; padding: var(--spacing-md); background-color: var(--bg-input); border: 1px solid var(--border); border-radius: var(--radius-lg); color: var(--text-primary); }
        .table { width: 100%; border-collapse: collapse; }
        .table thead { background-color: rgba(99, 102, 241, 0.05); border-bottom: 2px solid var(--border); }
        .table th { padding: var(--spacing-lg); text-align: left; font-weight: 600; }
        .table td { padding: var(--spacing-lg); border-bottom: 1px solid var(--border); font-size: 0.9rem; }
        .badge { display: inline-block; padding: var(--spacing-xs) var(--spacing-md); border-radius: var(--radius-md); font-size: 0.85rem; font-weight: 600; }
        .badge.create { background-color: rgba(16, 185, 129, 0.1); color: var(--success); }
        .badge.update { background-color: rgba(59, 130, 246, 0.1); color: var(--info); }
        .badge.delete { background-color: rgba(239, 68, 68, 0.1); color: var(--danger); }
        .badge.approve { background-color: rgba(245, 158, 11, 0.1); color: var(--warning); }
        .btn { padding: var(--spacing-sm) var(--spacing-lg); background-color: var(--primary); color: white; border: none; border-radius: var(--radius-lg); cursor: pointer; }
        .btn-secondary { background-color: var(--bg-tertiary); color: var(--text-primary); }
    </style>
</head>
<body>
    <button class="theme-toggle" id="themeToggle">🌙</button>

    <div class="layout">
        <div class="layout__sidebar" id="sidebar">
            <div class="sidebar__header">
                <div class="sidebar__logo">
                    <div class="sidebar__logo-icon">📊</div>
                    <span>HRIS</span>
                </div>
            </div>
            <nav class="sidebar__nav">
                <li class="sidebar__item"><a href="/dashboard/" class="sidebar__link">📈 Dashboard</a></li>
                <li class="sidebar__item"><a href="/employees/" class="sidebar__link">👥 Employees</a></li>
                <li class="sidebar__item"><a href="/departments/" class="sidebar__link">🏢 Departments</a></li>
                <li class="sidebar__item"><a href="/leaves/" class="sidebar__link">📅 Leave Requests</a></li>
                <li class="sidebar__item"><a href="/uploads/" class="sidebar__link">📤 Bulk Uploads</a></li>
                <li class="sidebar__item" data-admin-only><a href="/audit/" class="sidebar__link active">📋 Audit Logs</a></li>
            </nav>
            <div class="sidebar__footer">
                <button class="btn btn-secondary" onclick="logout()">🚪 Logout</button>
            </div>
        </div>

        <div class="layout__main">
            <header class="layout__header">
                <div class="header__left">
                    <button class="header__toggle" id="sidebarToggle">☰</button>
                    <h1 style="margin: 0;">Audit Logs</h1>
                </div>
                <div class="header__right">
                    <span id="userInfo">User</span>
                </div>
            </header>

            <div class="layout__content">
                <div class="container">
                    <div style="margin-bottom: var(--spacing-2xl);">
                        <h1>Audit Log Viewer</h1>
                        <p style="color: var(--text-tertiary);">Track all system activities and changes</p>
                    </div>

                    <div class="filter-bar">
                        <input type="text" id="searchInput" placeholder="Search by action or user..." onkeyup="searchLogs()">
                        <button class="btn" onclick="loadLogs()">🔄 Refresh</button>
                    </div>

                    <div class="card">
                        <div id="logsContainer">
                            <p style="text-align: center; color: var(--text-tertiary);">Loading...</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE_URL = 'http://localhost:8000/api/v1';
        const THEME_KEY = 'hris_theme';
        let logs = [];

        function initTheme() {
            const theme = localStorage.getItem(THEME_KEY) || 'dark';
            document.documentElement.setAttribute('data-theme', theme);
            document.getElementById('themeToggle').textContent = theme === 'dark' ? '☀️' : '🌙';
        }

        document.getElementById('themeToggle').addEventListener('click', () => {
            const current = document.documentElement.getAttribute('data-theme') || 'dark';
            const newTheme = current === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem(THEME_KEY, newTheme);
            document.getElementById('themeToggle').textContent = newTheme === 'dark' ? '☀️' : '🌙';
        });

        async function apiRequest(endpoint) {
            const token = localStorage.getItem('access_token');
            const response = await fetch(`${API_BASE_URL}${endpoint}`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            if (response.status === 401) {
                localStorage.clear();
                window.location.href = '/';
            }
            return response.ok ? response.json() : null;
        }

        async function loadLogs() {
            const data = await apiRequest('/audit-logs/?limit=100&ordering=-timestamp');
            if (data) {
                logs = Array.isArray(data.results) ? data.results : (Array.isArray(data) ? data : []);
                renderLogs(logs);
            }
        }

        function renderLogs(logList) {
            const container = document.getElementById('logsContainer');
            if (!logList || logList.length === 0) {
                container.innerHTML = '<p style="text-align: center; padding: var(--spacing-xl);">No audit logs found</p>';
                return;
            }

            container.innerHTML = `
                <table class="table">
                    <thead>
                        <tr>
                            <th>Timestamp</th>
                            <th>User</th>
                            <th>Action</th>
                            <th>Content Type</th>
                            <th>Details</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${logList.map(log => `
                            <tr>
                                <td>${new Date(log.timestamp).toLocaleString()}</td>
                                <td>${log.user?.email || 'System'}</td>
                                <td><span class="badge ${log.action}">${log.action}</span></td>
                                <td>${log.content_type || 'N/A'}</td>
                                <td>${log.object_str || '-'}</td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
        }

        function searchLogs() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const filtered = logs.filter(log =>
                (log.action || '').toLowerCase().includes(query) ||
                (log.user?.email || '').toLowerCase().includes(query)
            );
            renderLogs(filtered);
        }

        function logout() {
            if (confirm('Logout?')) {
                localStorage.clear();
                window.location.href = '/';
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            if (!localStorage.getItem('access_token')) window.location.href = '/';
            const isHRAdmin = localStorage.getItem('is_hr_admin') === 'true';
            if (!isHRAdmin) window.location.href = '/dashboard/';
            document.getElementById('userInfo').textContent = localStorage.getItem('user_name') || 'User';
            initTheme();
            loadLogs();
        });
    </script>
</body>
</html>
