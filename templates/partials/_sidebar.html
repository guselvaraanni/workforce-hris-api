<aside class="layout__sidebar" id="app-sidebar">
  <div class="sidebar__header">
    <a href="/dashboard/" class="sidebar__brand">
      <span class="sidebar__logo">HR</span>
      <div class="sidebar__brand-text">
        <div class="sidebar__brand-title">Nexus HRMS</div>
        <div class="sidebar__brand-subtitle">Workforce OS</div>
      </div>
    </a>
    <button type="button" class="sidebar__collapse-btn" id="sidebar-collapse" aria-label="Collapse sidebar">
      <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg>
    </button>
  </div>

  <nav class="sidebar__nav">
    <div class="sidebar__section"><span class="sidebar__label">Workspace</span></div>
    <a href="/dashboard/" class="sidebar__link {% if '/dashboard' in request.path %}active{% endif %}" title="Dashboard">
      <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      <span class="sidebar__label">Dashboard</span>
    </a>
    <a href="/employees/" class="sidebar__link {% if '/employees' in request.path %}active{% endif %}" title="Directory">
      <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>
      <span class="sidebar__label">Directory</span>
    </a>
    <a href="/departments/" class="sidebar__link {% if '/departments' in request.path %}active{% endif %}" title="Departments">
      <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 21h18M5 21V7l8-4v18M19 21V11l-6-4"/></svg>
      <span class="sidebar__label">Departments</span>
    </a>
    <a href="/leaves/" class="sidebar__link {% if '/leaves' in request.path %}active{% endif %}" title="Time Off">
      <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
      <span class="sidebar__label">Time Off</span>
    </a>

    {% if user.is_hr_admin %}
    <div class="sidebar__section"><span class="sidebar__label">Administration</span></div>
    <a href="/uploads/" class="sidebar__link {% if '/uploads' in request.path %}active{% endif %}" title="Bulk Imports">
      <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M17 8l-5-5-5 5M12 3v12"/></svg>
      <span class="sidebar__label">Bulk Imports</span>
    </a>
    <a href="/audit/" class="sidebar__link {% if '/audit' in request.path %}active{% endif %}" title="Audit Logs">
      <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><path d="M14 2v6h6M16 13H8M16 17H8M10 9H8"/></svg>
      <span class="sidebar__label">Audit Logs</span>
    </a>
    {% endif %}
  </nav>

  <div class="sidebar__footer">
    {% if user.is_authenticated %}
    <button type="button" class="sidebar__logout" onclick="logoutAction(event)" title="Sign out">
      <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/></svg>
      <span>Sign Out</span>
    </button>
    {% endif %}
  </div>
</aside>
<div class="sidebar-backdrop" id="sidebar-backdrop"></div>
