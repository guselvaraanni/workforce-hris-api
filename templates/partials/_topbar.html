<header class="layout__header">
  <div class="topbar__left">
    <button class="btn-icon" id="sidebar-toggle" type="button" aria-label="Open navigation">
      <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
    </button>
    <div>
      <div class="topbar__eyebrow">{% block topbar_eyebrow %}Workspace{% endblock %}</div>
      <h1 class="topbar__title">{% block page_title %}Dashboard{% endblock %}</h1>
      <div class="topbar__date">{{ today_date|date:"l, F j, Y" }}</div>
    </div>
  </div>

  <div class="topbar__actions">
    {% block topbar_actions %}{% endblock %}
    <button class="btn-icon" type="button" aria-label="Notifications" title="Notifications (coming soon)">
      <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9M13.73 21a2 2 0 01-3.46 0"/></svg>
    </button>
    <button id="theme-toggle" class="btn-icon" type="button" aria-label="Toggle theme">
      <svg data-theme-icon="moon" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
      <svg data-theme-icon="sun" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" style="display:none"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
    </button>
    {% include "partials/_profile_dropdown.html" %}
  </div>
</header>
