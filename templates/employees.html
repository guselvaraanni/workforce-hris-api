<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employees - Enterprise HRIS</title>
    <link rel="stylesheet" href="/static/css/styles.css">
    <style>
        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 100px;
            z-index: 500;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: var(--spacing-sm) var(--spacing-md);
            cursor: pointer;
            font-size: 1.2rem;
        }

        .filter-bar {
            display: flex;
            gap: var(--spacing-md);
            margin-bottom: var(--spacing-xl);
            flex-wrap: wrap;
        }

        .filter-bar input {
            flex: 1;
            min-width: 200px;
            padding: var(--spacing-md) var(--spacing-lg);
            background-color: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            color: var(--text-primary);
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: var(--spacing-2xl);
            max-width: 500px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: var(--spacing-lg);
        }

        .modal-close {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--text-tertiary);
        }

        .form-group {
            margin-bottom: var(--spacing-lg);
        }

        .form-group label {
            display: block;
            margin-bottom: var(--spacing-sm);
            font-weight: 600;
            color: var(--text-primary);
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: var(--spacing-md) var(--spacing-lg);
            background-color: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            color: var(--text-primary);
            font-family: inherit;
        }

        .btn {
            padding: var(--spacing-sm) var(--spacing-lg);
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: var(--radius-lg);
            cursor: pointer;
            font-weight: 600;
            transition: var(--transition);
        }

        .btn:hover {
            background-color: var(--primary-dark);
        }

        .btn-secondary {
            background-color: var(--bg-tertiary);
            color: var(--text-primary);
        }

        .btn-secondary:hover {
            background-color: var(--border);
        }

        .btn-danger {
            background-color: rgba(239, 68, 68, 0.1);
            color: var(--danger);
            border: 1px solid var(--danger);
        }

        .btn-danger:hover {
            background-color: var(--danger);
            color: white;
        }

        .table {
            width: 100%;
            border-collapse: collapse;
        }

        .table thead {
            background-color: rgba(99, 102, 241, 0.05);
            border-bottom: 2px solid var(--border);
        }

        .table th {
            padding: var(--spacing-lg);
            text-align: left;
            font-weight: 600;
            color: var(--text-tertiary);
            text-transform: uppercase;
            font-size: 0.85rem;
        }

        .table td {
            padding: var(--spacing-lg);
            border-bottom: 1px solid var(--border);
        }

        .table tbody tr:hover {
            background-color: rgba(99, 102, 241, 0.05);
        }

        .action-buttons {
            display: flex;
            gap: var(--spacing-sm);
        }

        .action-buttons button {
            padding: var(--spacing-xs) var(--spacing-md);
            font-size: 0.85rem;
        }

        .badge {
            display: inline-block;
            padding: var(--spacing-xs) var(--spacing-md);
            background-color: rgba(16, 185, 129, 0.1);
            color: var(--success);
            border-radius: var(--radius-md);
            font-size: 0.85rem;
            font-weight: 600;
        }

        .badge.pending {
            background-color: rgba(245, 158, 11, 0.1);
            color: var(--warning);
        }
    </style>
</head>
<body>
    <button class="theme-toggle" id="themeToggle" title="Toggle theme">🌙</button>

    <div class="layout">
        <!-- Sidebar -->
        <div class="layout__sidebar" id="sidebar">
            <div class="sidebar__header">
                <div class="sidebar__logo">
                    <div class="sidebar__logo-icon">📊</div>
                    <span>HRIS</span>
                </div>
            </div>

            <nav class="sidebar__nav">
                <li class="sidebar__item">
                    <a href="/dashboard/" class="sidebar__link">
                        <span class="sidebar__icon">📈</span>
                        <span>Dashboard</span>
                    </a>
                </li>
                <li class="sidebar__item">
                    <a href="/employees/" class="sidebar__link active">
                        <span class="sidebar__icon">👥</span>
                        <span>Employees</span>
                    </a>
                </li>
                <li class="sidebar__item">
                    <a href="/departments/" class="sidebar__link">
                        <span class="sidebar__icon">🏢</span>
                        <span>Departments</span>
                    </a>
                </li>
                <li class="sidebar__item">
                    <a href="/leaves/" class="sidebar__link">
                        <span class="sidebar__icon">📅</span>
                        <span>Leave Requests</span>
                    </a>
                </li>
                <li class="sidebar__item">
                    <a href="/uploads/" class="sidebar__link">
                        <span class="sidebar__icon">📤</span>
                        <span>Bulk Uploads</span>
                    </a>
                </li>
                <li class="sidebar__item" data-admin-only>
                    <a href="/audit/" class="sidebar__link">
                        <span class="sidebar__icon">📋</span>
                        <span>Audit Logs</span>
                    </a>
                </li>
            </nav>

            <div class="sidebar__footer">
                <button class="btn btn-secondary" onclick="logout()">🚪 Logout</button>
            </div>
        </div>

        <!-- Main Content -->
        <div class="layout__main">
            <header class="layout__header">
                <div class="header__left">
                    <button class="header__toggle" id="sidebarToggle">☰</button>
                    <h1 style="margin: 0;">Employees</h1>
                </div>
                <div class="header__right">
                    <div class="header__user">
                        <div class="header__avatar" id="userAvatar">U</div>
                        <span id="userInfo">User</span>
                    </div>
                </div>
            </header>

            <div class="layout__content">
                <div class="container">
                    <div class="page-header">
                        <div class="page-header__content">
                            <h1>Employee Management</h1>
                            <p style="margin: 0; color: var(--text-tertiary);">Manage workforce profiles</p>
                        </div>
                        <div class="page-header__actions">
                            <button class="btn" onclick="openAddEmployeeModal()" data-admin-only>
                                <span>➕ Add Employee</span>
                            </button>
                        </div>
                    </div>

                    <div class="filter-bar">
                        <input
                            type="text"
                            id="searchInput"
                            placeholder="Search by name or email..."
                            onkeyup="searchEmployees()"
                        >
                    </div>

                    <div class="card">
                        <div id="employeesContainer">
                            <p style="text-align: center; color: var(--text-tertiary);">Loading...</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Add/Edit Employee Modal -->
    <div class="modal" id="employeeModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Add Employee</h2>
                <button class="modal-close" onclick="closeModal()">×</button>
            </div>
            <form id="employeeForm" onsubmit="submitEmployeeForm(event)">
                <div class="form-group">
                    <label>First Name</label>
                    <input type="text" id="firstName" required>
                </div>
                <div class="form-group">
                    <label>Last Name</label>
                    <input type="text" id="lastName" required>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="employeeEmail" required>
                </div>
                <div class="form-group">
                    <label>Employee ID</label>
                    <input type="text" id="employeeId" required>
                </div>
                <div class="form-group">
                    <label>Department</label>
                    <select id="department" required>
                        <option value="">Select Department</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Salary</label>
                    <input type="number" id="salary" required>
                </div>
                <div class="form-group">
                    <label>Date of Joining</label>
                    <input type="date" id="dateOfJoining" required>
                </div>
                <div style="display: flex; gap: var(--spacing-md);">
                    <button type="submit" class="btn">Save</button>
                    <button type="button" class="btn btn-secondary" onclick="closeModal()">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // Theme Management
        const THEME_STORAGE_KEY = 'hris_theme';
        const themeToggle = document.getElementById('themeToggle');

        function initTheme() {
            const savedTheme = localStorage.getItem(THEME_STORAGE_KEY) || 'dark';
            document.documentElement.setAttribute('data-theme', savedTheme);
            updateThemeIcon(savedTheme);
        }

        function updateThemeIcon(theme) {
            themeToggle.textContent = theme === 'dark' ? '☀️' : '🌙';
        }

        function toggleTheme() {
            const currentTheme = document.documentElement.getAttribute('data-theme') || 'dark';
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem(THEME_STORAGE_KEY, newTheme);
            updateThemeIcon(newTheme);
        }

        themeToggle.addEventListener('click', toggleTheme);
        initTheme();

        // API Configuration
        const API_BASE_URL = 'http://localhost:8000/api/v1';
        let employees = [];
        let departments = [];

        // Authentication Check
        function checkAuthentication() {
            const token = localStorage.getItem('access_token');
            if (!token) {
                window.location.href = '/';
            }
        }

        // Load User Info
        function loadUserInfo() {
            const userName = localStorage.getItem('user_name') || 'User';
            const isHRAdmin = localStorage.getItem('is_hr_admin') === 'true';
            document.getElementById('userInfo').textContent = userName;

            if (!isHRAdmin) {
                document.querySelectorAll('[data-admin-only]').forEach(el => {
                    el.style.display = 'none';
                });
            }
        }

        // API Request
        async function apiRequest(endpoint, options = {}) {
            const token = localStorage.getItem('access_token');
            const headers = {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${token}`,
                ...options.headers
            };

            const response = await fetch(`${API_BASE_URL}${endpoint}`, {
                ...options,
                headers,
                mode: 'cors',
                credentials: 'include'
            });

            if (response.status === 401) {
                localStorage.clear();
                window.location.href = '/';
            }

            return response.ok ? response.json() : null;
        }

        // Load Employees
        async function loadEmployees() {
            const data = await apiRequest('/employees/?limit=100');
            if (data) {
                employees = Array.isArray(data.results) ? data.results : (Array.isArray(data) ? data : []);
                renderEmployees(employees);
            }
        }

        // Load Departments
        async function loadDepartments() {
            const data = await apiRequest('/departments/?limit=100');
            if (data) {
                departments = Array.isArray(data.results) ? data.results : (Array.isArray(data) ? data : []);
                const select = document.getElementById('department');
                select.innerHTML = '<option value="">Select Department</option>' +
                    departments.map(d => `<option value="${d.id}">${d.name}</option>`).join('');
            }
        }

        // Render Employees Table
        function renderEmployees(empList) {
            const container = document.getElementById('employeesContainer');
            if (!empList || empList.length === 0) {
                container.innerHTML = '<p style="text-align: center; padding: var(--spacing-xl);">No employees found</p>';
                return;
            }

            const html = `
                <table class="table">
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Department</th>
                            <th>Salary</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${empList.map(emp => `
                            <tr>
                                <td>${emp.user?.first_name || '-'} ${emp.user?.last_name || ''}</td>
                                <td>${emp.user?.email || '-'}</td>
                                <td>${emp.department?.name || '-'}</td>
                                <td>$${emp.salary || '0'}</td>
                                <td>
                                    <div class="action-buttons">
                                        <button class="btn" onclick="editEmployee(${emp.id})">Edit</button>
                                        <button class="btn btn-danger" onclick="deleteEmployee(${emp.id})">Delete</button>
                                    </div>
                                </td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
            container.innerHTML = html;
        }

        // Search Employees
        function searchEmployees() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const filtered = employees.filter(emp =>
                (emp.user?.first_name || '').toLowerCase().includes(query) ||
                (emp.user?.last_name || '').toLowerCase().includes(query) ||
                (emp.user?.email || '').toLowerCase().includes(query)
            );
            renderEmployees(filtered);
        }

        // Modal Functions
        function openAddEmployeeModal() {
            document.getElementById('modalTitle').textContent = 'Add Employee';
            document.getElementById('employeeForm').reset();
            document.getElementById('employeeModal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('employeeModal').classList.remove('active');
        }

        // Submit Employee Form
        async function submitEmployeeForm(event) {
            event.preventDefault();
            const data = {
                user: {
                    first_name: document.getElementById('firstName').value,
                    last_name: document.getElementById('lastName').value,
                    email: document.getElementById('employeeEmail').value
                },
                employee_id: document.getElementById('employeeId').value,
                department: parseInt(document.getElementById('department').value),
                salary: parseFloat(document.getElementById('salary').value),
                date_of_joining: document.getElementById('dateOfJoining').value
            };

            const response = await apiRequest('/employees/', {
                method: 'POST',
                body: JSON.stringify(data)
            });

            if (response) {
                alert('Employee added successfully');
                closeModal();
                loadEmployees();
            }
        }

        function editEmployee(id) {
            alert('Edit functionality coming soon');
        }

        function deleteEmployee(id) {
            if (confirm('Are you sure you want to delete this employee?')) {
                apiRequest(`/employees/${id}/`, { method: 'DELETE' }).then(() => {
                    loadEmployees();
                });
            }
        }

        function logout() {
            if (confirm('Are you sure you want to logout?')) {
                localStorage.clear();
                window.location.href = '/';
            }
        }

        // Sidebar toggle
        const sidebarToggle = document.getElementById('sidebarToggle');
        const sidebar = document.getElementById('sidebar');

        if (sidebarToggle && sidebar) {
            sidebarToggle.addEventListener('click', () => {
                sidebar.classList.toggle('hidden');
            });
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            checkAuthentication();
            loadUserInfo();
            loadDepartments();
            loadEmployees();
        });
    </script>
</body>
</html>
