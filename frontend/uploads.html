<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Uploads | Enterprise Workforce HRIS</title>

    <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

<div class="app-layout">

    <aside class="sidebar">
        <div class="sidebar-logo">
            <h2>HRIS</h2>
        </div>

        <nav class="sidebar-nav">
            <a href="dashboard.html">Dashboard</a>
            <a href="employees.html">Employees</a>
            <a href="leaves.html">Leaves</a>
            <a href="uploads.html" class="active">Uploads</a>
            <a href="audit.html">Audit Logs</a>
        </nav>
    </aside>

    <main class="main-content">

        <header class="topbar">
            <div>
                <h1>CSV Uploads</h1>
                <p>Bulk employee ingestion system</p>
            </div>
        </header>

        <section class="upload-box">
            <h2>Upload Employee CSV</h2>

            <div class="drop-zone">
                <p>Drag & Drop CSV file here</p>
                <button class="primary-btn">Browse File</button>
            </div>
        </section>

        <section class="dashboard-grid upload-grid">

            <div class="dashboard-card">
                <h3>Successful Records</h3>
                <p>9,842</p>
            </div>

            <div class="dashboard-card">
                <h3>Failed Records</h3>
                <p>158</p>
            </div>

            <div class="dashboard-card">
                <h3>Processing Time</h3>
                <p>34 sec</p>
            </div>

        </section>

    </main>

</div>

</html>
