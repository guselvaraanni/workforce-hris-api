<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Departments - Enterprise HRIS</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="layout">
        <!-- Sidebar -->
        <div class="layout__sidebar" id="sidebar">
            <div class="sidebar__header">
                <div class="sidebar__logo">
                    <div class="sidebar__logo-icon">📊</div>
                    <span>HRIS</span>
                </div>
            </div>

            <nav class="sidebar__nav">
                <li class="sidebar__item">
                    <a href="dashboard.html" class="sidebar__link">
                        <span class="sidebar__icon">📈</span>
                        <span>Dashboard</span>
                    </a>
                </li>
                <li class="sidebar__item">
                    <a href="employees.html" class="sidebar__link">
                        <span class="sidebar__icon">👥</span>
                        <span>Employees</span>
                    </a>
                </li>
                <li class="sidebar__item">
                    <a href="departments.html" class="sidebar__link active">
                        <span class="sidebar__icon">🏢</span>
                        <span>Departments</span>
                    </a>
                </li>
                <li class="sidebar__item">
                    <a href="leaves.html" class="sidebar__link">
                        <span class="sidebar__icon">📅</span>
                        <span>Leave Requests</span>
                    </a>
                </li>
                <li class="sidebar__item">
                    <a href="uploads.html" class="sidebar__link">
                        <span class="sidebar__icon">📤</span>
                        <span>Bulk Uploads</span>
                    </a>
                </li>
                <li class="sidebar__item">
                    <a href="audit.html" class="sidebar__link">
                        <span class="sidebar__icon">📋</span>
                        <span>Audit Logs</span>
                    </a>
                </li>
            </nav>

            <div class="sidebar__footer">
                <button class="btn btn--secondary btn--block" onclick="logout()">
                    <span>🚪</span>
                    <span>Logout</span>
                </button>
            </div>
        </div>

        <!-- Main Content -->
        <div class="layout__main">
            <header class="layout__header">
                <div class="header__left">
                    <button class="header__toggle" id="sidebarToggle">☰</button>
                    <h1 style="margin: 0;">Departments</h1>
                </div>
                <div class="header__right">
                    <div class="header__user">
                        <div class="header__avatar" id="userAvatar">U</div>
                        <span id="userInfo">User</span>
                    </div>
                </div>
            </header>

            <div class="layout__content">
                <div class="container">
                    <!-- Page Header -->
                    <div class="page-header">
                        <div class="page-header__content">
                            <h1>Department Management</h1>
                            <p style="margin: 0; color: var(--text-tertiary);">Manage organization structure</p>
                        </div>
                        <div class="page-header__actions">
                            <button class="btn btn--primary" onclick="openAddDepartmentModal()" data-admin-only>
                                <span>➕</span>
                                <span>Add Department</span>
                            </button>
                        </div>
                    </div>

                    <!-- Departments Table -->
                    <div class="card">
                        <div id="departmentTableContainer">
                            <!-- Loaded via JS -->
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Add/Edit Department Modal -->
    <div class="modal" id="departmentModal">
        <div class="modal__overlay"></div>
        <div class="modal__content">
            <div class="modal__header">
                <h2 class="modal__title" id="deptModalTitle">Add Department</h2>
                <button class="modal__close" onclick="Modal.close('departmentModal')">×</button>
            </div>
            <div class="modal__body">
                <form id="departmentForm" onsubmit="handleDepartmentSubmit(event)">
                    <div class="form-group">
                        <label class="form-label required">Department Name</label>
                        <input type="text" name="name" class="form-input" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Description</label>
                        <textarea name="description" class="form-textarea" placeholder="Department description..."></textarea>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Department Head</label>
                        <select name="head" class="form-select" id="headSelect">
                            <option value="">Select Department Head</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Budget</label>
                        <input type="number" name="budget" class="form-input" min="0" step="0.01">
                    </div>
                    <div class="form-group">
                        <label class="form-checkbox">
                            <input type="checkbox" name="is_active" checked>
                            <span>Active</span>
                        </label>
                    </div>
                </form>
            </div>
            <div class="modal__footer">
                <button class="btn btn--secondary" onclick="Modal.close('departmentModal')">Cancel</button>
                <button class="btn btn--primary" onclick="document.getElementById('departmentForm').dispatchEvent(new Event('submit'))">Save Department</button>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>
        let allDepartments = [];
        let allManagers = [];
        let editingDeptId = null;

        async function loadDepartments() {
            try {
                document.getElementById('departmentTableContainer').innerHTML = '<div class="loading"><div class="spinner"></div>Loading departments...</div>';

                const res = await APIClient.get('/departments/?page_size=100');
                allDepartments = res.results || res;

                // Load managers
                await loadManagers();

                displayDepartments();
            } catch (error) {
                console.error('Load departments error:', error);
                Notification.error('Failed to load departments');
                document.getElementById('departmentTableContainer').innerHTML = '<div class="error-state"><p>Failed to load departments</p></div>';
            }
        }

        async function loadManagers() {
            try {
                const res = await APIClient.get('/employees/?page_size=100');
                allManagers = res.results || res;

                const select = document.getElementById('headSelect');
                const options = allManagers
                    .filter(m => m.user?.is_manager)
                    .map(m => `<option value="${m.user.id}">${escapeHtml(m.full_name)}</option>`)
                    .join('');

                select.innerHTML = '<option value="">Select Department Head</option>' + options;
            } catch (error) {
                console.log('Managers load note:', error.message);
            }
        }

        function displayDepartments() {
            if (allDepartments.length === 0) {
                document.getElementById('departmentTableContainer').innerHTML = '<div class="empty-state"><p>No departments</p></div>';
                return;
            }

            const html = `
                <table class="data-table data-table--striped">
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Head</th>
                            <th>Employees</th>
                            <th>Budget</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${allDepartments.map(dept => `
                            <tr>
                                <td><strong>${escapeHtml(dept.name)}</strong></td>
                                <td>${escapeHtml(dept.head_name || '-')}</td>
                                <td><span class="badge badge--info">${dept.employee_count || 0}</span></td>
                                <td>${formatCurrency(dept.budget || 0)}</td>
                                <td>${getStatusBadge(dept.is_active ? 'active' : 'inactive')}</td>
                                <td>
                                    <div style="display: flex; gap: var(--spacing-sm);">
                                        <button class="btn btn--secondary btn--small" onclick="editDepartment(${dept.id})" data-admin-only>Edit</button>
                                        <button class="btn btn--danger btn--small" onclick="deleteDepartment(${dept.id})" data-admin-only>Delete</button>
                                    </div>
                                </td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;

            document.getElementById('departmentTableContainer').innerHTML = html;
            loadUserInfo();
        }

        function openAddDepartmentModal() {
            editingDeptId = null;
            document.getElementById('deptModalTitle').textContent = 'Add Department';
            document.getElementById('departmentForm').reset();
            document.querySelector('input[name="is_active"]').checked = true;
            FormHandler.clearErrors(document.getElementById('departmentForm'));
            Modal.open('departmentModal');
        }

        async function editDepartment(id) {
            try {
                const dept = await APIClient.get(`/departments/${id}/`);
                editingDeptId = id;
                document.getElementById('deptModalTitle').textContent = 'Edit Department';

                const form = document.getElementById('departmentForm');
                form.elements['name'].value = dept.name || '';
                form.elements['description'].value = dept.description || '';
                form.elements['head'].value = dept.head || '';
                form.elements['budget'].value = dept.budget || '';
                form.elements['is_active'].checked = dept.is_active;

                FormHandler.clearErrors(form);
                Modal.open('departmentModal');
            } catch (error) {
                Notification.error('Failed to load department');
            }
        }

        async function handleDepartmentSubmit(e) {
            e.preventDefault();

            const form = document.getElementById('departmentForm');
            const data = {
                name: form.elements['name'].value,
                description: form.elements['description'].value,
                head: form.elements['head'].value || null,
                budget: form.elements['budget'].value || 0,
                is_active: form.elements['is_active'].checked
            };

            try {
                if (editingDeptId) {
                    await APIClient.patch(`/departments/${editingDeptId}/`, data);
                    Notification.success('Department updated');
                } else {
                    await APIClient.post('/departments/', data);
                    Notification.success('Department created');
                }

                Modal.close('departmentModal');
                loadDepartments();
            } catch (error) {
                Notification.error(error.message || 'Failed to save department');
            }
        }

        async function deleteDepartment(id) {
            if (!confirm('Delete this department?')) return;

            try {
                await APIClient.delete(`/departments/${id}/`);
                Notification.success('Department deleted');
                loadDepartments();
            } catch (error) {
                Notification.error('Failed to delete department');
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            if (AuthManager.isAuthenticated()) {
                loadDepartments();
            }
        });
    </script>
</body>
</html>
