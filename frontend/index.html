<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise HRIS - Login</title>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .login-container {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            padding: var(--spacing-lg);
        }

        .login-card {
            background-color: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: var(--radius-xl);
            padding: var(--spacing-2xl);
            max-width: 420px;
            width: 100%;
            box-shadow: var(--shadow-xl);
        }

        .login-header {
            text-align: center;
            margin-bottom: var(--spacing-2xl);
        }

        .login-logo {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            border-radius: var(--radius-lg);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 2rem;
            font-weight: bold;
            margin: 0 auto var(--spacing-lg);
        }

        .login-title {
            font-size: 1.875rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: var(--spacing-sm);
        }

        .login-subtitle {
            color: var(--text-tertiary);
            font-size: 0.95rem;
        }

        .login-form {
            margin-top: var(--spacing-2xl);
        }

        .form-group {
            margin-bottom: var(--spacing-lg);
        }

        .form-label {
            display: block;
            margin-bottom: var(--spacing-sm);
            font-weight: 600;
            color: var(--text-primary);
            font-size: 0.95rem;
        }

        .form-input {
            width: 100%;
            padding: var(--spacing-md) var(--spacing-lg);
            background-color: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            color: var(--text-primary);
            font-size: 0.95rem;
            font-family: inherit;
            transition: var(--transition);
        }

        .form-input:focus {
            outline: none;
            border-color: var(--primary);
            background-color: rgba(99, 102, 241, 0.05);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }

        .form-input::placeholder {
            color: var(--text-tertiary);
        }

        .login-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: var(--spacing-xl);
            font-size: 0.9rem;
        }

        .remember-checkbox {
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
            cursor: pointer;
        }

        .remember-checkbox input {
            cursor: pointer;
            accent-color: var(--primary);
        }

        .login-footer a {
            color: var(--primary);
            text-decoration: none;
            transition: var(--transition);
        }

        .login-footer a:hover {
            color: var(--primary-light);
        }

        .login-button {
            width: 100%;
            padding: var(--spacing-md) var(--spacing-lg);
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: var(--radius-lg);
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: var(--spacing-md);
            margin-top: var(--spacing-lg);
        }

        .login-button:hover {
            background-color: var(--primary-dark);
            transform: translateY(-1px);
            box-shadow: var(--shadow-md);
        }

        .login-button:active {
            transform: translateY(0);
        }

        .login-button.loading {
            opacity: 0.7;
            pointer-events: none;
        }

        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .alert {
            padding: var(--spacing-lg) var(--spacing-lg);
            border-radius: var(--radius-lg);
            border-left: 4px solid;
            margin-bottom: var(--spacing-lg);
            display: none;
        }

        .alert.show {
            display: block;
        }

        .alert--success {
            background-color: rgba(16, 185, 129, 0.1);
            border-color: var(--success);
            color: var(--success-light);
        }

        .alert--error {
            background-color: rgba(239, 68, 68, 0.1);
            border-color: var(--danger);
            color: var(--danger-light);
        }

        .demo-credentials {
            margin-top: var(--spacing-2xl);
            padding-top: var(--spacing-xl);
            border-top: 1px solid var(--border);
            text-align: center;
        }

        .demo-label {
            font-size: 0.85rem;
            color: var(--text-tertiary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: var(--spacing-md);
            display: block;
        }

        .demo-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: var(--spacing-md);
        }

        .demo-btn {
            padding: var(--spacing-sm) var(--spacing-md);
            background-color: rgba(99, 102, 241, 0.1);
            border: 1px solid rgba(99, 102, 241, 0.2);
            border-radius: var(--radius-md);
            color: var(--primary-light);
            cursor: pointer;
            font-size: 0.85rem;
            transition: var(--transition);
            font-weight: 600;
        }

        .demo-btn:hover {
            background-color: rgba(99, 102, 241, 0.2);
            border-color: var(--primary);
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <div class="login-logo">📊</div>
                <h1 class="login-title">Enterprise HRIS</h1>
                <p class="login-subtitle">Workforce Management System</p>
            </div>

            <div id="alert" class="alert"></div>

            <form class="login-form" id="loginForm">
                <div class="form-group">
                    <label class="form-label">Email Address</label>
                    <input 
                        type="email" 
                        class="form-input" 
                        id="email" 
                        placeholder="hr@example.com"
                        required
                    >
                </div>

                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input 
                        type="password" 
                        class="form-input" 
                        id="password" 
                        placeholder="••••••••"
                        required
                    >
                </div>

                <div class="login-footer">
                    <label class="remember-checkbox">
                        <input type="checkbox" id="rememberMe">
                        <span>Remember me</span>
                    </label>
                    <a href="#">Forgot password?</a>
                </div>

                <button type="submit" class="login-button" id="loginBtn">
                    <span>Sign In</span>
                </button>
            </form>

            <div class="demo-credentials">
                <span class="demo-label">Demo Credentials</span>
                <div class="demo-buttons">
                    <button type="button" class="demo-btn" onclick="fillDemoHR()">
                        HR Admin
                    </button>
                    <button type="button" class="demo-btn" onclick="fillDemoManager()">
                        Manager
                    </button>
                </div>
                <p style="font-size: 0.8rem; color: var(--text-tertiary); margin-top: var(--spacing-md);">
                    Password: <strong>TestPass123!</strong>
                </p>
            </div>
        </div>
    </div>

    <script>
        // API Configuration
        const API_BASE_URL = 'http://localhost:8000/api/v1';
        const API_LOGIN_ENDPOINT = `${API_BASE_URL}/auth/login/`;

        // DOM Elements
        const loginForm = document.getElementById('loginForm');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const loginBtn = document.getElementById('loginBtn');
        const alertDiv = document.getElementById('alert');

        // Demo credentials fill functions
        function fillDemoHR() {
            emailInput.value = 'hr@example.com';
            passwordInput.value = 'Hr@Admin123';
        }

        function fillDemoManager() {
            emailInput.value = 'employee1@example.com';
            passwordInput.value = 'TestPass123!';
        }

        // Show alert message
        function showAlert(message, type = 'error') {
            alertDiv.className = `alert show alert--${type}`;
            alertDiv.textContent = message;
            setTimeout(() => {
                alertDiv.classList.remove('show');
            }, 5000);
        }

        // Login handler
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = emailInput.value.trim();
            const password = passwordInput.value;

            if (!email || !password) {
                showAlert('Please fill in all fields', 'error');
                return;
            }

            // Disable button and show loading state
            loginBtn.classList.add('loading');
            loginBtn.innerHTML = '<span class="spinner"></span><span>Signing in...</span>';

            try {
                const response = await fetch(API_LOGIN_ENDPOINT, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        email: email,
                        password: password
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    // Store tokens and user info
                    localStorage.setItem('access_token', data.access);
                    localStorage.setItem('refresh_token', data.refresh);
                    localStorage.setItem('user_id', data.user_id);
                    localStorage.setItem('user_email', data.email);
                    localStorage.setItem('user_name', data.full_name);
                    localStorage.setItem('is_hr_admin', data.is_hr_admin);
                    localStorage.setItem('is_manager', data.is_manager);

                    showAlert('Login successful! Redirecting...', 'success');
                    
                    // Redirect to dashboard
                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 1000);
                } else {
                    showAlert(data.detail || 'Invalid credentials. Please try again.', 'error');
                }
            } catch (error) {
                console.error('Login error:', error);
                showAlert('Connection error. Please check if the API server is running.', 'error');
            } finally {
                // Re-enable button
                loginBtn.classList.remove('loading');
                loginBtn.innerHTML = '<span>Sign In</span>';
            }
        });

        // Check if already logged in
        window.addEventListener('load', () => {
            const token = localStorage.getItem('access_token');
            if (token) {
                window.location.href = 'dashboard.html';
            }
        });
    </script>
</body>
</html>
