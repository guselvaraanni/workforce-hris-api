[pytest]
DJANGO_SETTINGS_MODULE = config.settings
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --tb=short
    --strict-markers
    --no-header
    --cov=employees
    --cov-report=term-missing
    --cov-report=html:htmlcov
    --cov-fail-under=70

markers =
    slow: marks tests as slow (use -m "not slow" to skip)
    integration: marks integration tests that need a running DB
    concurrency: marks concurrency tests requiring TransactionTestCase
