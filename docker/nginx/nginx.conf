# =============================================================================
# docker/nginx/nginx.conf — Main Nginx configuration
# =============================================================================

user  nginx;
worker_processes  auto;   # Automatically match number of CPU cores

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    # Maximum simultaneous connections per worker.
    # Total max connections = worker_processes × worker_connections
    worker_connections 1024;
    use epoll;          # Linux's most efficient I/O event mechanism
    multi_accept on;    # Accept as many connections as possible at once
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging format ───────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    # ── Performance ──────────────────────────────────────────────────────────
    sendfile        on;   # Use OS sendfile() to avoid user-space copy
    tcp_nopush      on;   # Batch TCP packets for efficiency
    tcp_nodelay     on;   # Disable Nagle for real-time responsiveness
    keepalive_timeout 65;

    # ── Gzip compression ─────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json
               application/javascript application/xml+rss
               application/atom+xml image/svg+xml;

    # Include virtual host configs
    include /etc/nginx/conf.d/*.conf;
}
