# =============================================================================
# docker/nginx/default.conf — Nginx virtual host configuration
# Sits in front of Gunicorn (upstream: api:8000)
# =============================================================================

upstream django_app {
    # "api" is the Docker service name — resolved via Docker DNS.
    # least_conn distributes to the worker with fewest active connections.
    least_conn;
    server api:8000;
}

server {
    listen 80;
    server_name _;

    # Redirect all HTTP → HTTPS in production.
    # Comment out if your load balancer handles TLS termination upstream.
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name _;

    # ── TLS — replace with your actual certificate paths ─────────────────
    # ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;

    # ── Security Headers ──────────────────────────────────────────────────
    add_header X-Frame-Options         DENY;
    add_header X-Content-Type-Options  nosniff;
    add_header X-XSS-Protection        "1; mode=block";
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload";

    # ── Client Upload Limit (matches Django FILE_UPLOAD_MAX_MEMORY_SIZE) ──
    client_max_body_size 10M;

    # ── Static Files — served directly by Nginx, NOT proxied to Django ────
    # This is the main performance reason for having Nginx in production.
    location /static/ {
        alias /app/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Media Files ───────────────────────────────────────────────────────
    location /media/ {
        alias /app/media/;
        expires 7d;
        add_header Cache-Control "public";
    }

    # ── Health Check — allow without SSL for load balancer probes ─────────
    location /health/ {
        proxy_pass http://django_app;
        proxy_set_header Host $host;
        access_log off;
    }

    # ── Django API — proxy all other requests to Gunicorn ─────────────────
    location / {
        proxy_pass http://django_app;

        # Pass real client IP so Django can log it correctly.
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts — match Gunicorn's --timeout value.
        proxy_connect_timeout 60s;
        proxy_send_timeout    120s;
        proxy_read_timeout    120s;

        # Buffering: let Nginx buffer the response so Gunicorn workers
        # are freed immediately after generating the response.
        proxy_buffering    on;
        proxy_buffer_size  4k;
        proxy_buffers      8 4k;
    }
}
